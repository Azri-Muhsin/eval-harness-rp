project_drive_dir: /content/drive/MyDrive/healthcare-intent-project
base_output_dir: /content/drive/MyDrive/healthcare-intent-project/outputs/runs
prediction_output_dir: /content/drive/MyDrive/healthcare-intent-project/outputs/predictions
report_output_dir: /content/drive/MyDrive/healthcare-intent-project/outputs/reports
results_file: /content/drive/MyDrive/healthcare-intent-project/outputs/results.csv

hf_namespace: research-mates
push_to_hf_default: false
hf_private: true

allowed_labels:
  - Treatment_Procedure
  - Vaccine_Information
  - Facility_Locator
  - Disease_Information
  - Provider_Locator
  - General_Health_Education
  - Emergency
  - Test_Diagnostics
  - Insurance_Information

default_train:
  batch_size: 8
  grad_accum: 2
  learning_rate: 0.0002
  lora_r: 16
  lora_dropout: 0
  epochs: 2
  save_steps: 500
  eval_steps: 250
  weight_decay: 0.01

experiments:
  # -------------------------
  # Stage 1: dataset size
  # -------------------------
  - id: qwen17_1400_label
    group: dataset_size
    model_name: Qwen/Qwen3-1.7B
    train_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/train_1400_label.jsonl
    val_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/val.jsonl
    test_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/test.jsonl
    sft_type: label
    max_seq_length: 512
    max_new_tokens: 100

  - id: qwen17_2800_label
    group: dataset_size
    model_name: Qwen/Qwen3-1.7B
    train_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/train_2800_label.jsonl
    val_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/val.jsonl
    test_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/test.jsonl
    sft_type: label
    max_seq_length: 512
    max_new_tokens: 100

  - id: qwen17_7000_label
    group: dataset_size
    model_name: Qwen/Qwen3-1.7B
    train_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/train_7000_label.jsonl
    val_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/val.jsonl
    test_file: /content/drive/MyDrive/healthcare-intent-project/data/processed/test.jsonl
    sft_type: label
    max_seq_length: 512
    max_new_tokens: 100

  # -------------------------
